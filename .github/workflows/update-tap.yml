name: Update Homebrew Tap

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.3)'
        required: true

jobs:
  update-tap:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    env:
      TAP_REPO: ${{ vars.TAP_REPO || 'luw2007/homebrew-tap' }}
      TAP_DEFAULT_BRANCH: ${{ vars.TAP_DEFAULT_BRANCH || 'main' }}
    
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Derive version from tag
        id: ver
        env:
          VERSION_INPUT: ${{ github.event.inputs.version }}
        run: |
          tag="${VERSION_INPUT:-}"
          if [ -z "$tag" ]; then
            tag="${GITHUB_REF_NAME:-}"
          fi
          if [ -z "$tag" ]; then
            tag="${{ github.event.release.tag_name }}"
          fi
          tag="${tag#refs/tags/}"
          if [ -z "$tag" ]; then
            echo "::error::Unable to determine tag/version" >&2
            exit 1
          fi
          if [[ "$tag" != v* ]]; then
            tag="v${tag}"
          fi
          version="${tag#v}"
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "tag=$tag" >> $GITHUB_OUTPUT

      - name: Show version
        run: echo "Updating to version ${{ steps.ver.outputs.version }} (tag ${{ steps.ver.outputs.tag }})"

      - name: Clone tap repository
        env:
          TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TOKEN:-}" ]; then
            echo "::error::Missing TAP_PUSH_TOKEN secret with write access to $TAP_REPO"
            exit 1
          fi
          TAP_DIR="$RUNNER_TEMP/homebrew-tap"
          git clone "https://x-access-token:${TOKEN}@github.com/${TAP_REPO}.git" "$TAP_DIR"
          echo "TAP_DIR=$TAP_DIR" >> $GITHUB_ENV

      - name: Generate Formula
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          REPO_URL="https://github.com/luw2007/llm_json_formatter"
          
          compute_sha256() {
            local url="$1"
            local tmp_file=$(mktemp)
            echo "Downloading $url ..."
            if curl -L -f -sS "$url" -o "$tmp_file"; then
              sha256sum "$tmp_file" | awk '{print $1}'
              rm -f "$tmp_file"
              return 0
            else
              echo "REPLACE_WITH_SHA256_WHEN_AVAILABLE"
              rm -f "$tmp_file"
              return 1
            fi
          }
          
          AARCH64_DARWIN_URL="${REPO_URL}/releases/download/v${VERSION}/jf-v${VERSION}-aarch64-apple-darwin.tar.gz"
          X86_64_DARWIN_URL="${REPO_URL}/releases/download/v${VERSION}/jf-v${VERSION}-x86_64-apple-darwin.tar.gz"
          AARCH64_LINUX_URL="${REPO_URL}/releases/download/v${VERSION}/jf-v${VERSION}-aarch64-unknown-linux-gnu.tar.gz"
          X86_64_LINUX_URL="${REPO_URL}/releases/download/v${VERSION}/jf-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          
          echo "Computing SHA256 for macOS ARM64..."
          AARCH64_DARWIN_SHA=$(compute_sha256 "$AARCH64_DARWIN_URL")
          
          echo "Computing SHA256 for macOS x86_64..."
          X86_64_DARWIN_SHA=$(compute_sha256 "$X86_64_DARWIN_URL")
          
          echo "Computing SHA256 for Linux ARM64..."
          AARCH64_LINUX_SHA=$(compute_sha256 "$AARCH64_LINUX_URL")
          
          echo "Computing SHA256 for Linux x86_64..."
          X86_64_LINUX_SHA=$(compute_sha256 "$X86_64_LINUX_URL")
          
          cat > "$TAP_DIR/Formula/jf.rb" << EOF
          class Jf < Formula
            desc "LLM-optimized JSON formatter for better readability and token efficiency"
            homepage "${REPO_URL}"
            license "MIT"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.arm?
                url "${AARCH64_DARWIN_URL}"
                sha256 "${AARCH64_DARWIN_SHA}"
              else
                url "${X86_64_DARWIN_URL}"
                sha256 "${X86_64_DARWIN_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${AARCH64_LINUX_URL}"
                sha256 "${AARCH64_LINUX_SHA}"
              else
                url "${X86_64_LINUX_URL}"
                sha256 "${X86_64_LINUX_SHA}"
              end
            end

            def install
              bin.install "jf"
            end

            test do
              assert_match "Format JSON", shell_output("#{bin}/jf --help")
            end
          end
          EOF
          
          echo "Generated formula:"
          cat "$TAP_DIR/Formula/jf.rb"

      - name: Commit and push
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
          TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
        run: |
          set -euo pipefail
          cd "$TAP_DIR"
          
          git add Formula/jf.rb
          
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          
          git commit -m "chore: update jf to v${{ steps.ver.outputs.version }}"
          git push origin "$TAP_DEFAULT_BRANCH"
          
          echo "✅ Successfully updated Homebrew tap"
